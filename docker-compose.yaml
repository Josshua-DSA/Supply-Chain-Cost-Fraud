services:
  mongo:
    image: mongo:7.0
    container_name: neo_horcrox_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: neo_horcrox
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neo_horcrox_api
    ports:
      - "8000:8000"
    environment:
      APP_NAME: Neo Horcrox Supply Chain API
      DEBUG: "false"
      LOG_LEVEL: INFO
      MODEL_ROOT: /project/model
      MONGODB_ENABLED: "true"
      MONGODB_REQUIRED: "false"
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB_NAME: neo_horcrox
      ALLOWED_ORIGINS: "*"
    volumes:
      - ./model/artifacts:/project/model/artifacts:ro
      - ./model/dataset:/project/model/dataset:ro
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: node:20-alpine
    container_name: neo_horcrox_frontend
    working_dir: /frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    volumes:
      - ./app/frontend:/frontend
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mongo_data:
